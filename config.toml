model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
[projects."/home/users1/linopeng"]
trust_level = "trusted"


[projects."/home/users/linopeng"]
trust_level = "trusted"

[projects."/fast-playground2/linopeng/bsv/tmp/gcc-riscv"]
trust_level = "trusted"

# MCP server setting
[mcp_servers.github]
command = "/home/users/linopeng/.claude/plugins/github-mcp-server/bin/github-mcp-server"
args = ["stdio"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "$GITHUB_PERSONAL_ACCESS_TOKEN"
http_proxy = "$http_proxy"
https_proxy = "$https_proxy"
HTTP_PROXY = "$HTTP_PROXY"
HTTPS_PROXY = "$HTTPS_PROXY"
ALL_PROXY = "$ALL_PROXY"
all_proxy = "$all_proxy"
NO_PROXY = "$NO_PROXY"
no_proxy = "$no_proxy"

[mcp_servers.andes-bugzilla]
command = "python3"
args = [
  "/home/users/linopeng/.codex/bugzilla-jsonrpc-mcp/server.py",
]

[mcp_servers.andes-bugzilla.env]
BUGZILLA_API_KEY = "$BUGZILLA_API_KEY"
BUGZILLA_BASE_URL = "http://e-andes.andestech.com/bugzilla5"
http_proxy = "$http_proxy"
https_proxy = "$https_proxy"
HTTP_PROXY = "$HTTP_PROXY"
HTTPS_PROXY = "$HTTPS_PROXY"
ALL_PROXY = "$ALL_PROXY"
all_proxy = "$all_proxy"
NO_PROXY = "$NO_PROXY"
no_proxy = "$no_proxy"

[mcp_servers.andes-gitea]
command = "docker"
args = [
  "run",
  "-i",
  "--rm",
  "-e", "GITEA_ACCESS_TOKEN",
  "-e", "GITEA_HOST",
  "docker.gitea.com/gitea-mcp-server",
  "/app/gitea-mcp",
  "-t", "stdio",
]

[mcp_servers.andes-gitea.env]
http_proxy = "$http_proxy"
https_proxy = "$https_proxy"
HTTP_PROXY = "$HTTP_PROXY"
HTTPS_PROXY = "$HTTPS_PROXY"
ALL_PROXY = "$ALL_PROXY"
all_proxy = "$all_proxy"
NO_PROXY = "$NO_PROXY"
no_proxy = "$no_proxy"

[features]
multi_agent = true
use_legacy_landlock = true
